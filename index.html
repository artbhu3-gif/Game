<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إطعام مريومة</title>
<style>
/* --- General Styles --- */
html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Cairo', Arial, sans-serif; }
body { display: flex; justify-content: center; align-items: center; background: #333; touch-action: none; }
button { cursor: pointer; font-family: inherit; }

/* --- Containers --- */
.page {
  width: 100%; max-width: 450px; height: 100%;
  background: #f0f0f0; display: flex; flex-direction: column;
  box-shadow: 0 0 20px rgba(0,0,0,.5);
}
#game-container { display: flex; }
#leaderboard-page { display: none; padding: 20px; box-sizing: border-box; text-align: center; }

/* --- Game UI --- */
#info-bar {
  position: relative; /* For welcome message positioning */
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 15px; font-size: 20px; background: #fff;
  overflow: hidden; /* Prevents welcome message from showing outside */
}
#pause-btn {
  font-size: 24px; background: none; border: none; padding: 0 10px;
}
#welcome-message {
    position: absolute;
    left: 50%;
    top: 110%; /* Start below */
    transform: translateX(-50%);
    background: #28a745;
    color: white;
    padding: 5px 15px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.5s ease, top 0.5s ease;
    white-space: nowrap;
}
#game-board {
  position: relative; flex-grow: 1;
  background: lightpink; overflow: hidden;
  border-top: 3px solid #333; border-bottom: 3px solid #333;
}
#player {
  position: absolute; bottom: 10px; left: 50%;
  transform: translateX(-50%); width: 60px; height: 60px;
  display: none; object-fit: contain;
}

/* --- Shapes & Animations --- */
.shape { position: absolute; top: -50px; }
.circle { width: 30px; height: 30px; background: #f44336; border-radius: 50%; }
.triangle { width: 40px; height: 40px; background: url('obstacle.png') center/contain no-repeat; }
.collected-animation { animation: collect 0.3s ease; }
@keyframes collect { 50% { transform: translateX(-50%) scale(1.2); } }

/* --- Overlays --- */
.overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.7);
  color: white; z-index: 10; display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center; padding: 20px;
}
.overlay button {
  padding: 15px 30px; font-size: 22px; border: none; border-radius: 10px;
  background: #ffc107; margin-top: 15px;
}
#start-screen .button-group { display: flex; gap: 10px; }
#start-screen .button-group button { font-size: 18px; padding: 12px 20px; }

/* --- Instagram Input --- */
#insta-user {
  padding: 10px; font-size: 18px; border-radius: 8px; border: 2px solid #ddd;
  margin-bottom: 20px; text-align: center; direction: ltr;
}
#start-btn:disabled { background: #999; cursor: not-allowed; }
#validation-error { color: #ffc107; font-size: 14px; height: 16px; margin-bottom: 5px; }

/* --- Controls & Timer Warning --- */
.time-warning { color: red; font-weight: bold; animation: pulse 1s infinite; }
@keyframes pulse { 50% { transform: scale(1.1); } }
#controls {
  position: absolute; bottom: 20px; width: 100%; display: flex;
  justify-content: space-between; padding: 0 10%; box-sizing: border-box;
}
#controls button {
  width: 80px; height: 60px; font-size: 36px; border-radius: 10px;
  background: rgba(255,255,255,.4); border: 2px solid rgba(255,255,255,.7);
}

/* --- Leaderboard Page Styles --- */
#leaderboard-page h1 { font-size: 28px; margin-bottom: 20px; }
#leaderboard-list { list-style: none; padding: 0; margin: 0; width: 100%; }
#leaderboard-list li {
  display: flex; align-items: center; padding: 8px 12px;
  margin-bottom: 8px; background: #e9e9e9; border-radius: 8px;
  font-size: 14px;
}
#leaderboard-list li span { flex: 1; text-align: right; }
#leaderboard-list li .score { flex: 0 0 50px; text-align: center; font-weight: bold; }
#leaderboard-list li .time { flex: 0 0 70px; text-align: center; color: #555; }
#leaderboard-list li .status { flex: 0 0 30px; text-align: left; font-size: 18px; }

#leaderboard-list li:nth-child(1) { background: #ffd700; font-weight: bold; }
#leaderboard-list li:nth-child(2) { background: #c0c0c0; }
#leaderboard-list li:nth-child(3) { background: #cd7f32; }
#leaderboard-page button { padding: 15px 40px; font-size: 20px; border-radius: 10px; background: #28a745; color: white; border: none; }
</style>
</head>
<body>

<!-- Page 1: Game -->
<div id="game-container" class="page">
  <div id="info-bar">
    <button id="pause-btn">⏸</button>
    <div id="score">النقاط: 0</div>
    <div id="timer">الوقت: 02:30</div>
    <div id="welcome-message"></div>
  </div>
  <div id="game-board">
    <div id="start-screen" class="overlay">
      <h1>إطعام مريومة</h1>
      <p>اجمع الدوائر الحمراء وتجنب المثلثات!</p>
      <div id="validation-error"></div>
      <input id="insta-user" placeholder="@user" maxlength="20">
      <div class="button-group">
        <button id="start-btn" disabled>ابدأ اللعبة</button>
        <button id="view-leaderboard-btn">🏆 أفضل 10</button>
      </div>
    </div>
    <img id="player" src="character.png">
    <div id="controls">
      <button id="right-btn">→</button>
      <button id="left-btn">←</button>
    </div>
  </div>
</div>

<!-- Page 2: Leaderboard -->
<div id="leaderboard-page" class="page">
    <h1>🏆 قائمة أفضل 10 أبطال</h1>
    <ol id="leaderboard-list"><li>يتم التحميل...</li></ol>
    <button onclick="location.reload()">العودة للعب</button>
</div>

<audio id="collect-sound" src="collect.mp3"></audio>
<audio id="lose-sound" src="lose.mp3"></audio>

<!-- ========== FIREBASE v12 ========== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDsJ6fm4SFNLnRuHj-b80L0BweGVNkoiIM",
  authDomain: "game-21f55.firebaseapp.com",
  projectId: "game-21f55",
  storageBucket: "game-21f55.firebasestorage.app",
  messagingSenderId: "88852711134",
  appId: "1:88852711134:web:c504445d3d800c3e13244f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const leaderboardRef = collection(db, "leaderboard");

/* ---------- DOM ELEMENTS ---------- */
const gameContainer = document.getElementById("game-container");
const leaderboardPage = document.getElementById("leaderboard-page");
const board = document.getElementById("game-board");
const player = document.getElementById("player");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const startScreen = document.getElementById("start-screen");
const leaderboardList = document.getElementById("leaderboard-list");
const collectSound = document.getElementById("collect-sound");
const loseSound = document.getElementById("lose-sound");
const leftBtn = document.getElementById("left-btn");
const rightBtn = document.getElementById("right-btn");
const startBtn = document.getElementById("start-btn");
const pauseBtn = document.getElementById("pause-btn");
const viewLeaderboardBtn = document.getElementById("view-leaderboard-btn");
const instaUser = document.getElementById("insta-user");
const validationError = document.getElementById("validation-error");
const welcomeMessage = document.getElementById("welcome-message");


/* ---------- GAME STATE ---------- */
const INITIAL_TIME = 150; // 2.5 minutes
let score = 0, time = INITIAL_TIME, speed = 6;
let isGameOver = true, isPaused = true, frenzy = false;
let move = { left: false, right: false };
let shapeInterval, timerInterval, gameLoopId;
let fallingShapes = [];

/* ---------- PAGE NAVIGATION ---------- */
function showGamePage() {
    gameContainer.style.display = 'flex';
    leaderboardPage.style.display = 'none';
}
function showLeaderboardPage() {
    loadLeaderboard();
    gameContainer.style.display = 'none';
    leaderboardPage.style.display = 'flex';
}
viewLeaderboardBtn.onclick = showLeaderboardPage;

/* ---------- USERNAME VALIDATION & STORAGE ---------- */
const instaRegex = /^@[a-zA-Z0-9_]{1,30}$/;
instaUser.addEventListener('input', () => {
    const user = instaUser.value;
    if (instaRegex.test(user)) {
        startBtn.disabled = false;
        validationError.textContent = '';
    } else {
        startBtn.disabled = true;
        validationError.textContent = 'اليوزر يجب أن يبدأ بـ @ ويحتوي حروف إنجليزية وأرقام فقط';
    }
});

/* ---------- GAME CORE ---------- */
startBtn.onclick = () => {
    const user = instaUser.value;
    localStorage.setItem('instaUser', user); // Save username

    // Show welcome message
    welcomeMessage.textContent = `hi ${user}`;
    welcomeMessage.style.top = '50%';
    welcomeMessage.style.opacity = 1;
    setTimeout(() => {
        welcomeMessage.style.top = '110%';
        welcomeMessage.style.opacity = 0;
    }, 2500);

    startScreen.style.display = "none";
    startGame();
};

function startGame() {
    // Reset game state for a fresh start
    isGameOver = false;
    isPaused = false;
    score = 0;
    time = INITIAL_TIME;
    frenzy = false;
    fallingShapes.forEach(shape => shape.element.remove());
    fallingShapes = [];

    // Update UI
    player.style.display = "block";
    scoreEl.textContent = `النقاط: 0`;
    timerEl.classList.remove('time-warning');
    time++; // Offset the first tick which happens immediately
    updateTimer(); 

    // Start game mechanics
    resumeGame();
}

function pauseGame() {
    if (isGameOver) return;
    isPaused = true;
    pauseBtn.textContent = '▶️';
    clearInterval(timerInterval);
    clearInterval(shapeInterval);
}

function resumeGame() {
    if (isGameOver) return;
    isPaused = false;
    pauseBtn.textContent = '⏸';
    shapeInterval = setInterval(createShape, frenzy ? 450 : 1000);
    timerInterval = setInterval(updateTimer, 1000);
}

pauseBtn.onclick = () => {
    isPaused ? resumeGame() : pauseGame();
};

function updateTimer() {
    time--;
    const minutes = Math.floor(time / 60).toString().padStart(2, '0');
    const seconds = (time % 60).toString().padStart(2, '0');
    timerEl.textContent = `الوقت: ${minutes}:${seconds}`;

    if (time === 10 && !frenzy) {
        frenzy = true;
        timerEl.classList.add("time-warning");
        clearInterval(shapeInterval);
        shapeInterval = setInterval(createShape, 450);
    }
    if (time <= 0) {
        winGame();
    }
}

function gameLoop() {
    if (!isGameOver && !isPaused) {
        if (move.left) movePlayer(-speed);
        if (move.right) movePlayer(speed);

        for (let i = fallingShapes.length - 1; i >= 0; i--) {
            const shapeData = fallingShapes[i];
            shapeData.y += shapeData.fallSpeed;
            shapeData.element.style.top = shapeData.y + "px";

            if (collide(player, shapeData.element)) {
                if (shapeData.element.classList.contains("circle")) {
                    score++;
                    scoreEl.textContent = `النقاط: ${score}`;
                    collectSound.currentTime = 0; collectSound.play();
                    player.classList.add("collected-animation");
                    setTimeout(() => player.classList.remove("collected-animation"), 300);
                    shapeData.element.remove();
                    fallingShapes.splice(i, 1);
                } else {
                    loseGame();
                }
            } else if (shapeData.y > board.offsetHeight) {
                shapeData.element.remove();
                fallingShapes.splice(i, 1);
            }
        }
    }
    requestAnimationFrame(gameLoop);
}

function movePlayer(dx) {
    const x = player.offsetLeft + dx;
    const max = board.offsetWidth - player.offsetWidth;
    player.style.left = Math.max(0, Math.min(max, x)) + "px";
}

function createShape() {
    const s = document.createElement("div");
    s.className = "shape " + (Math.random() < 0.7 ? "circle" : "triangle");
    s.style.left = Math.random() * (board.offsetWidth - 40) + "px";
    board.appendChild(s);
    
    fallingShapes.push({
        element: s,
        y: -50,
        fallSpeed: (Math.random() * 3 + 2) * (frenzy ? 1.6 : 1)
    });
}

function collide(a, b) {
    const A = a.getBoundingClientRect();
    const B = b.getBoundingClientRect();
    return !(A.right < B.left || A.left > B.right || A.bottom < B.top || A.top > B.bottom);
}

async function endGame(status) {
    if (isGameOver) return;
    isGameOver = true;
    isPaused = true;
    clearInterval(timerInterval);
    clearInterval(shapeInterval);
    
    if (status === 'loss') loseSound.play();
    
    await saveScore(status);
    showLeaderboardPage();
}

const winGame = () => endGame('win');
const loseGame = () => endGame('loss');

/* ---------- CONTROLS ---------- */
document.addEventListener("keydown", e => { if (e.key === "ArrowLeft") move.left = true; if (e.key === "ArrowRight") move.right = true; });
document.addEventListener("keyup", e => { if (e.key === "ArrowLeft") move.left = false; if (e.key === "ArrowRight") move.right = false; });
leftBtn.addEventListener("mousedown", () => move.left = true);
leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); move.left = true; });
rightBtn.addEventListener("mousedown", () => move.right = true);
rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); move.right = true; });
document.addEventListener("mouseup", () => { move.left = false; move.right = false; });
document.addEventListener("touchend", () => { move.left = false; move.right = false; });

/* ---------- FIREBASE & LEADERBOARD ---------- */
async function saveScore(status) {
    const playerName = instaUser.value;
    const timeSpent = INITIAL_TIME - time;
    if (score > 0) {
        try {
            await addDoc(leaderboardRef, { name: playerName, score, timeSpent, status, createdAt: serverTimestamp() });
        } catch (error) { console.error("Error saving score: ", error); }
    }
}

async function loadLeaderboard() {
    leaderboardList.innerHTML = "<li>يتم التحميل...</li>";
    try {
        const q = query(leaderboardRef, orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        
        if (snap.empty) {
            leaderboardList.innerHTML = "<li>لا توجد نقاط بعد، كن أول الأبطال!</li>";
            return;
        }

        leaderboardList.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const li = document.createElement("li");
            const minutes = Math.floor(data.timeSpent / 60).toString().padStart(2, '0');
            const seconds = (data.timeSpent % 60).toString().padStart(2, '0');

            li.innerHTML = `
                <span>${data.name}</span>
                <strong class="score">${data.score}</strong>
                <span class="time">${minutes}:${seconds}</span>
                <span class="status">${data.status === 'win' ? '⚡' : '💫'}</span>
            `;
            leaderboardList.appendChild(li);
        });
    } catch (error) {
        console.error("Error loading leaderboard: ", error);
        leaderboardList.innerHTML = "<li>حدث خطأ في تحميل القائمة.</li>";
    }
}

/* ---------- INITIAL APP LOAD ---------- */
function init() {
    const savedUser = localStorage.getItem('instaUser');
    if (savedUser) {
        instaUser.value = savedUser;
        instaUser.dispatchEvent(new Event('input')); // Trigger validation
    }
    showGamePage();
    gameLoop(); // Start the game engine loop
}

init();
</script>

</body>
</html>
