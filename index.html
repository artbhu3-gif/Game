<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لعبة جمع الدوائر</title>
<style>
html, body { height:100%; margin:0; overflow:hidden; }
body {
  font-family: Arial, sans-serif;
  display:flex; justify-content:center; align-items:center;
  background:#333; touch-action:none;
}
#game-container {
  width:100%; max-width:450px; height:100%;
  background:#f0f0f0; display:flex; flex-direction:column;
  box-shadow:0 0 20px rgba(0,0,0,.5);
}
#info-bar {
  display:flex; justify-content:space-between;
  padding:10px; font-size:22px;
}
#game-board {
  position:relative; flex-grow:1;
  background:lightpink; overflow:hidden;
  border-top:3px solid #333; border-bottom:3px solid #333;
}
#player {
  position:absolute; bottom:10px; left:50%;
  transform:translateX(-50%);
  width:60px; height:60px;
  display:none; object-fit:contain;
}
.collected-animation {
  animation: collect 0.3s ease;
}
@keyframes collect {
  50% { transform:translateX(-50%) scale(1.2); }
}
.shape { position:absolute; top:-50px; }
.circle {
  width:30px; height:30px;
  background:#f44336; border-radius:50%;
}
.triangle {
  width:40px; height:40px;
  background:url('obstacle.png') center/contain no-repeat;
}
.overlay {
  position:absolute; inset:0;
  background:rgba(0,0,0,.7);
  color:white; z-index:10;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  text-align:center;
}
.overlay button {
  padding:15px 30px; font-size:22px;
  border:none; border-radius:10px;
  background:#ffc107; cursor:pointer;
}
#player-name {
  padding:10px; font-size:18px;
  border-radius:8px; border:2px solid #ddd;
  margin-bottom:20px; text-align:center;
}
.time-warning {
  color:red; font-weight:bold;
  animation:pulse 1s infinite;
}
@keyframes pulse {
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}
#controls {
  position:absolute; bottom:20px; width:100%;
  display:flex; justify-content:space-between;
  padding:0 10%;
  box-sizing: border-box; /* Added for better padding behavior */
}
#controls button {
  width:80px; height:60px;
  font-size:36px; border-radius:10px;
  background:rgba(255,255,255,.4);
  border:2px solid rgba(255,255,255,.7);
}
#leaderboard { padding:10px; text-align:center; }
#leaderboard ol { list-style:none; padding:0; margin:0; }
#leaderboard li {
  display:flex; justify-content:space-between;
  padding:5px 15px; margin-bottom:5px;
  background:#e9e9e9; border-radius:5px;
}
#leaderboard li:nth-child(1){background:#ffd700;font-weight:bold}
#leaderboard li:nth-child(2){background:#c0c0c0}
#leaderboard li:nth-child(3){background:#cd7f32}
</style>
</head>
<body>

<div id="game-container">
<div id="info-bar">
  <div id="score">النقاط: 0</div>
  <div id="timer">الوقت: 60</div>
</div>
<div id="game-board">
  <div id="start-screen" class="overlay">
    <h1>لعبة جمع الدوائر</h1>
    <input id="player-name" placeholder="اكتب اسمك" maxlength="15">
    <button id="start-btn">ابدأ اللعبة</button>
  </div>
  <div id="win-screen" class="overlay" style="display:none">
    <h1 id="win-message"></h1>
    <button onclick="location.reload()">العب مجددًا</button>
  </div>
  <div id="game-over" class="overlay" style="display:none">
    <h1>انتهت اللعبة!</h1>
    <button onclick="location.reload()">إعادة</button>
  </div>
  <img id="player" src="character.png">
  <div id="controls">
    <button id="left-btn">←</button>
    <button id="right-btn">→</button>
  </div>
</div>
<div id="leaderboard">
  <h3>🏆 أعلى 3 نقاط</h3>
  <ol id="leaderboard-list"><li>جار التحميل...</li></ol>
</div>
</div>

<audio id="collect-sound" src="collect.mp3"></audio>
<audio id="lose-sound" src="lose.mp3"></audio>

<!-- ========== FIREBASE v12 ========== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyDsJ6fm4SFNLnRuHj-b80L0BweGVNkoiIM",
  authDomain: "game-21f55.firebaseapp.com",
  projectId: "game-21f55",
  storageBucket: "game-21f55.firebasestorage.app",
  messagingSenderId: "88852711134",
  appId: "1:88852711134:web:c504445d3d800c3e13244f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const leaderboardRef = collection(db, "leaderboard");
/* ---------- GAME LOGIC ---------- */
const board = document.getElementById("game-board");
const player = document.getElementById("player");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const startScreen = document.getElementById("start-screen");
const winScreen = document.getElementById("win-screen");
const gameOver = document.getElementById("game-over");
const winMessage = document.getElementById("win-message");
const leaderboardList = document.getElementById("leaderboard-list");
const collectSound = document.getElementById("collect-sound");
const loseSound = document.getElementById("lose-sound");
const leftBtn = document.getElementById("left-btn");
const rightBtn = document.getElementById("right-btn");

let score = 0, time = 60, speed = 6;
let isGameOver = false, frenzy = false;
let move = { left:false, right:false };
let shapeInterval, timerInterval;

document.getElementById("start-btn").onclick = () => {
  startScreen.style.display = "none";
  player.style.display = "block";
  startGame();
};

function startGame(){
  shapeInterval = setInterval(createShape, 1000);
  timerInterval = setInterval(()=>{
    time--;
    timerEl.textContent = `الوقت: ${time}`;
    if(time === 10){
      frenzy = true;
      timerEl.classList.add("time-warning");
      clearInterval(shapeInterval);
      shapeInterval = setInterval(createShape, 450);
    }
    if(time <= 0) winGame();
  },1000);
  requestAnimationFrame(gameLoop);
}

function gameLoop(){
  if(isGameOver) return;
  if(move.left) movePlayer(-speed);
  if(move.right) movePlayer(speed);
  requestAnimationFrame(gameLoop);
}

function movePlayer(dx){
  const x = player.offsetLeft + dx;
  const max = board.offsetWidth - player.offsetWidth;
  player.style.left = Math.max(0, Math.min(max, x)) + "px";
}

// Keyboard controls
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") move.left=true;
  if(e.key==="ArrowRight") move.right=true;
});
document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft") move.left=false;
  if(e.key==="ArrowRight") move.right=false;
});

// --- CORRECTED MOUSE & TOUCH CONTROLS ---
// Start movement
leftBtn.addEventListener("mousedown", () => move.left = true);
leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); move.left = true; });
rightBtn.addEventListener("mousedown", () => move.right = true);
rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); move.right = true; });

// Stop movement when released anywhere
document.addEventListener("mouseup", () => { move.left = false; move.right = false; });
document.addEventListener("touchend", () => { move.left = false; move.right = false; });
// --- END OF CORRECTION ---

function createShape(){
  const s = document.createElement("div");
  s.className = "shape " + (Math.random()<0.7?"circle":"triangle");
  s.style.left = Math.random()*(board.offsetWidth-40)+"px";
  board.appendChild(s);
  let y=-50, fallSpeed=(Math.random()*3+2)*(frenzy?1.6:1);
  function fall(){
    if(isGameOver){s.remove();return;}
    y+=fallSpeed; s.style.top=y+"px";
    if(y>board.offsetHeight){s.remove();return;}
    if(collide(player,s)){
      if(s.classList.contains("circle")){
        score++; scoreEl.textContent=`النقاط: ${score}`;
        collectSound.currentTime=0; collectSound.play();
        player.classList.add("collected-animation");
        setTimeout(()=>player.classList.remove("collected-animation"),300);
        s.remove();
      } else loseGame();
      return;
    }
    requestAnimationFrame(fall);
  }
  requestAnimationFrame(fall);
}

function collide(a,b){
  const A=a.getBoundingClientRect(), B=b.getBoundingClientRect();
  return !(A.right<B.left||A.left>B.right||A.bottom<B.top||A.top>B.bottom);
}

async function winGame(){
  isGameOver=true; clearInterval(shapeInterval); clearInterval(timerInterval);
  await saveScore();
  winMessage.textContent=`مبروك! نقاطك ${score}`;
  winScreen.style.display="flex";
}

async function loseGame(){
  isGameOver=true; clearInterval(shapeInterval); clearInterval(timerInterval);
  loseSound.play();
  await saveScore();
  gameOver.style.display="flex";
}

async function saveScore(){
  const playerName = document.getElementById("player-name").value || "لاعب";
  if (score > 0) { // Optional: only save if score is positive
    await addDoc(leaderboardRef,{
        name: playerName,
        score, 
        createdAt: serverTimestamp()
    });
  }
  loadLeaderboard();
}

async function loadLeaderboard(){
  leaderboardList.innerHTML="";
  const q=query(leaderboardRef,orderBy("score","desc"),limit(3));
  const snap=await getDocs(q);
  if (snap.empty) {
    leaderboardList.innerHTML = "<li>لا توجد نقاط بعد</li>";
    return;
  }
  snap.forEach(d=>{
    const li=document.createElement("li");
    li.innerHTML=`<span>${d.data().name}</span><strong>${d.data().score}</strong>`;
    leaderboardList.appendChild(li);
  });
}

loadLeaderboard();
</script>

</body>
</html>
