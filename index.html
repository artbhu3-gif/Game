<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة جمع الدوائر</title>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; background-color: #333; flex-direction: column; touch-action: none; }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 450px; display: flex; flex-direction: column; background-color: #f0f0f0; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #info-bar { display: flex; justify-content: space-between; width: 90%; font-size: 24px; margin: 10px auto; flex-shrink: 0; }
        #game-board { position: relative; width: 100%; flex-grow: 1; border-top: 3px solid #333; border-bottom: 3px solid #333; overflow: hidden; background-color: lightpink; }
        #player { position: absolute; width: 60px; height: 60px; bottom: 10px; left: 50%; transform: translateX(-50%); display: none; object-fit: contain; transition: transform 0.1s; }
        .collected-animation { animation: collect-animation 0.3s ease; }
        @keyframes collect-animation { 50% { transform: translateX(-50%) scale(1.2); } }
        .shape { position: absolute; top: -50px; }
        .circle { width: 30px; height: 30px; background-color: #f44336; border-radius: 50%; }
        .triangle { width: 40px; height: 40px; background-image: url('obstacle.png'); background-size: contain; background-repeat: no-repeat; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; background-color: rgba(0, 0, 0, 0.7); text-align: center; z-index: 10; padding: 20px; box-sizing: border-box; }
        .overlay h1 { font-size: 36px; margin-bottom: 20px; }
        .overlay button { padding: 15px 30px; font-size: 24px; border: none; border-radius: 10px; cursor: pointer; background-color: #ffc107; }
        #win-screen, #game-over { display: none; }
        #player-name-input { padding: 10px; font-size: 18px; border-radius: 8px; border: 2px solid #ddd; text-align: center; margin-bottom: 20px; width: 80%; }
        .time-warning { color: red; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #controls { display: flex; justify-content: space-between; width: 100%; padding: 0 10%; box-sizing: border-box; position: absolute; bottom: 20px; }
        #controls button { width: 80px; height: 60px; font-size: 36px; font-weight: bold; background-color: rgba(255, 255, 255, 0.4); color: rgba(0, 0, 0, 0.7); border: 2px solid rgba(255, 255, 255, 0.7); border-radius: 10px; cursor: pointer; user-select: none; -webkit-user-select: none; }
        #leaderboard { padding: 10px; text-align: center; background-color: #f0f0f0; flex-shrink: 0; }
        #leaderboard h2 { margin: 0 0 10px 0; font-size: 20px; color: #333; }
        #leaderboard ol { list-style: none; padding: 0; margin: 0; }
        #leaderboard li { display: flex; justify-content: space-between; padding: 5px 15px; background-color: #e9e9e9; border-radius: 5px; margin-bottom: 5px; font-size: 16px; }
        #leaderboard li:nth-child(1) { background-color: #ffd700; font-weight: bold; }
        #leaderboard li:nth-child(2) { background-color: #c0c0c0; }
        #leaderboard li:nth-child(3) { background-color: #cd7f32; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="info-bar">
            <div id="score">النقاط: 0</div>
            <div id="timer">الوقت: 60</div>
        </div>
        <div id="game-board">
            <div id="start-screen" class="overlay">
                <h1>لعبة جمع الدوائر</h1>
                <input type="text" id="player-name-input" placeholder="اكتب اسمك هنا" maxlength="15">
                <button id="start-btn">ابدأ اللعبة</button>
            </div>
            <div id="win-screen" class="overlay">
                <h1 id="win-message"></h1>
                <button onclick="location.reload()">العب مجدداً</button>
            </div>
            <div id="game-over" class="overlay"><h1>انتهت اللعبة!</h1><button onclick="location.reload()">إعادة اللعب</button></div>
            <img id="player" src="character.png" alt="Player">
            <div id="controls">
                <button id="right-btn">&rarr;</button>
                <button id="left-btn">&larr;</button>
            </div>
        </div>
        <div id="leaderboard">
            <h2>🏆 أعلى 3 نقاط 🏆</h2>
            <ol id="leaderboard-list"><li>جار التحميل...</li></ol>
        </div>
    </div>
    
    <audio id="collect-sound" src="collect.mp3" preload="auto"></audio>
    <audio id="lose-sound" src="lose.mp3" preload="auto"></audio>

    <!-- START: FIREBASE SDK INTEGRATION -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- END: FIREBASE SDK INTEGRATION -->

    <script>
        // --- START: FIREBASE CONFIGURATION ---
        // !! هام جداً: الصق كود firebaseConfig الذي نسخته من موقع Firebase هنا
        const firebaseConfig = {
            apiKey: "AIzaSyACtuOMx8t3zIxb4Vs3xwIbQnL1eZbbCEg",
  authDomain: "circle-game-leaderboard.firebaseapp.com",
  projectId: "circle-game-leaderboard",
  storageBucket: "circle-game-leaderboard.firebasestorage.app",
  messagingSenderId: "469539505990",
  appId: "1:469539505990:web:3e8fc9c90033ad1ba58747",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const leaderboardCollection = db.collection('leaderboard');
        // --- END: FIREBASE CONFIGURATION ---

        const gameBoard = document.getElementById('game-board');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const startScreen = document.getElementById('start-screen');
        const winScreen = document.getElementById('win-screen');
        const gameOverDisplay = document.getElementById('game-over');
        const startBtn = document.getElementById('start-btn');
        const collectSound = document.getElementById('collect-sound');
        const loseSound = document.getElementById('lose-sound');
        const playerNameInput = document.getElementById('player-name-input');
        const winMessage = document.getElementById('win-message');
        const leaderboardList = document.getElementById('leaderboard-list');

        let score = 0, timeLeft = 60, playerSpeed = 6; 
        let shapeInterval, timerInterval;
        let isGameOver = false;
        let movement = { left: false, right: false };
        let isFrenzyMode = false;
        let playerName = "";

        startBtn.addEventListener('click', () => {
            playerName = playerNameInput.value.trim() || "يا بطل";
            startScreen.style.display = 'none';
            player.style.display = 'block';
            startGame();
        });

        function startGame() {
            shapeInterval = setInterval(createShape, 1000);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = \`الوقت: \${timeLeft}\`;
                if (timeLeft === 10 && !isFrenzyMode) {
                    isFrenzyMode = true;
                    timerDisplay.classList.add('time-warning');
                    clearInterval(shapeInterval);
                    shapeInterval = setInterval(createShape, 450);
                }
                if (timeLeft <= 0) winGame();
            }, 1000);
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (isGameOver) return;
            if (movement.left) movePlayer('left');
            if (movement.right) movePlayer('right');
            requestAnimationFrame(gameLoop);
        }

        function movePlayer(direction) {
            const left = player.offsetLeft;
            const boardWidth = gameBoard.offsetWidth;
            const playerWidth = player.offsetWidth;
            if (direction === 'left' && left > 0) {
                player.style.left = Math.max(0, left - playerSpeed) + 'px';
            } else if (direction === 'right' && left < (boardWidth - playerWidth)) {
                player.style.left = Math.min(boardWidth - playerWidth, left + playerSpeed) + 'px';
            }
        }
        
        document.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') movement.left = true; if (e.key === 'ArrowRight') movement.right = true; });
        document.addEventListener('keyup', (e) => { if (e.key === 'ArrowLeft') movement.left = false; if (e.key === 'ArrowRight') movement.right = false; });
        ['mousedown', 'touchstart'].forEach(evt => {
            document.getElementById('left-btn').addEventListener(evt, (e) => { e.preventDefault(); movement.left = true; });
            document.getElementById('right-btn').addEventListener(evt, (e) => { e.preventDefault(); movement.right = true; });
        });
        ['mouseup', 'touchend', 'mouseleave'].forEach(evt => {
            document.body.addEventListener(evt, () => { movement.left = false; movement.right = false; });
        });

        function winGame() {
            if (isGameOver) return;
            isGameOver = true;
            stopAllIntervals();
            saveScore(playerName, score);
            winMessage.textContent = \`مبروك \${playerName}! نقاطك هي: \${score}\`;
            winScreen.style.display = 'flex';
        }

        function loseGame() {
            if (isGameOver) return;
            isGameOver = true;
            stopAllIntervals();
            loseSound.play();
            saveScore(playerName, score); 
            player.style.display = 'none'; 
            gameOverDisplay.style.display = 'flex';
        }

        function createShape() {
            if (isGameOver) return;
            const shape = document.createElement('div');
            shape.classList.add('shape', Math.random() < 0.7 ? 'circle' : 'triangle');
            shape.style.left = Math.random() * (gameBoard.offsetWidth - 40) + 'px';
            gameBoard.appendChild(shape);
            moveShape(shape);
        }

        function moveShape(shape) {
            let topPosition = -50;
            let shapeSpeed = (Math.random() * 3 + 2) * (isFrenzyMode ? 1.6 : 1);
            function fall() {
                if (isGameOver || topPosition > gameBoard.offsetHeight) { shape.remove(); return; }
                topPosition += shapeSpeed;
                shape.style.top = topPosition + 'px';
                if (detectCollision(player, shape)) {
                    if (shape.classList.contains('circle')) {
                        score++;
                        scoreDisplay.textContent = \`النقاط: \${score}\`;
                        shape.remove();
                        collectSound.currentTime = 0; collectSound.play();
                        player.classList.add('collected-animation');
                        setTimeout(() => player.classList.remove('collected-animation'), 300);
                    } else { loseGame(); }
                } else { requestAnimationFrame(fall); }
            }
            requestAnimationFrame(fall);
        }

        function detectCollision(a, b) {
            const aRect = a.getBoundingClientRect(); const bRect = b.getBoundingClientRect();
            return !(aRect.bottom < bRect.top || aRect.top > bRect.bottom || aRect.right < bRect.left || aRect.left > bRect.right);
        }

        function stopAllIntervals() {
            clearInterval(shapeInterval); clearInterval(timerInterval);
        }

        // --- START: وظائف قائمة المتصدرين الجديدة (Firebase) ---
        function saveScore(name, score) {
            if (!name || score <= 0) {
                displayLeaderboard(); // عرض القائمة حتى لو لم يسجل اللاعب نقاط
                return;
            }
            leaderboardCollection.add({
                name: name,
                score: score,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                console.log("تم حفظ النقاط بنجاح!");
                displayLeaderboard(); // تحديث القائمة بعد الحفظ
            })
            .catch((error) => {
                console.error("خطأ في حفظ النقاط: ", error);
            });
        }

        function displayLeaderboard() {
            leaderboardList.innerHTML = '<li>جار التحميل...</li>';
            leaderboardCollection.orderBy('score', 'desc').limit(3).get()
                .then(querySnapshot => {
                    leaderboardList.innerHTML = '';
                    if (querySnapshot.empty) {
                        leaderboardList.innerHTML = '<li>لم يتم تسجيل أي نقاط بعد</li>';
                        return;
                    }
                    querySnapshot.forEach((doc, index) => {
                        const entry = doc.data();
                        const li = document.createElement('li');
                        li.innerHTML = \`<span>\${index + 1}. \${entry.name}</span><strong>\${entry.score}</strong>\`;
                        leaderboardList.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error("خطأ في جلب قائمة المتصدرين: ", error);
                    leaderboardList.innerHTML = '<li>حدث خطأ في تحميل القائمة</li>';
                });
        }
        // --- END: وظائف قائمة المتصدرين الجديدة (Firebase) ---

        document.addEventListener('DOMContentLoaded', displayLeaderboard);
    </script>
</body>
</html>
