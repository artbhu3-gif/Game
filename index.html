<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لعبة جمع الدوائر</title>

<style>
html, body { height: 100%; margin: 0; overflow: hidden; }
body { display:flex; justify-content:center; align-items:center; background:#333; }
#game-container { width:100%; max-width:450px; height:100%; background:#f0f0f0; position:relative; }
#info-bar { display:flex; justify-content:space-between; padding:10px; font-size:22px; }
#game-board { position:relative; height:70%; background:lightpink; overflow:hidden; }
#player { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); width:60px; display:none; }
.shape { position:absolute; top:-40px; }
.circle { width:30px; height:30px; background:red; border-radius:50%; }
.triangle { width:40px; height:40px; background:black; }
.overlay { position:absolute; inset:0; background:rgba(0,0,0,.7); color:white;
display:flex; flex-direction:column; justify-content:center; align-items:center; }
#leaderboard { padding:10px; }
</style>
</head>

<body>
<div id="game-container">

<div id="info-bar">
  <div id="score">النقاط: 0</div>
  <div id="timer">الوقت: 60</div>
</div>

<div id="game-board">
  <div id="start-screen" class="overlay">
    <h2>لعبة جمع الدوائر</h2>
    <input id="player-name" placeholder="اسمك">
    <button id="start-btn">ابدأ</button>
  </div>

  <div id="game-over" class="overlay" style="display:none">
    <h2>انتهت اللعبة</h2>
    <button onclick="location.reload()">إعادة</button>
  </div>

  <img id="player" src="character.png">
</div>

<div id="leaderboard">
  <h3>🏆 أعلى 3 نقاط</h3>
  <ol id="leaderboard-list"><li>جار التحميل...</li></ol>
</div>

</div>

<!-- ================= FIREBASE v12 ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDsJ6fm4SFNLnRuHj-b80L0BweGVNkoiIM",
  authDomain: "game-21f55.firebaseapp.com",
  projectId: "game-21f55",
  storageBucket: "game-21f55.firebasestorage.app",
  messagingSenderId: "88852711134",
  appId: "1:88852711134:web:c504445d3d800c3e13244f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const leaderboardRef = collection(db, "leaderboard");

// ---------- GAME LOGIC ----------
const startBtn = document.getElementById("start-btn");
const startScreen = document.getElementById("start-screen");
const player = document.getElementById("player");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const board = document.getElementById("game-board");
const leaderboardList = document.getElementById("leaderboard-list");

let score = 0;
let time = 60;
let interval;

startBtn.onclick = () => {
  startScreen.style.display = "none";
  player.style.display = "block";
  startGame();
};

function startGame() {
  interval = setInterval(() => {
    time--;
    timerEl.textContent = `الوقت: ${time}`;
    createCircle();
    if (time <= 0) endGame();
  }, 1000);
}

function createCircle() {
  const c = document.createElement("div");
  c.className = "shape circle";
  c.style.left = Math.random() * (board.offsetWidth - 30) + "px";
  board.appendChild(c);

  let y = -30;
  const fall = setInterval(() => {
    y += 4;
    c.style.top = y + "px";
    if (y > board.offsetHeight) {
      clearInterval(fall);
      c.remove();
    }
  }, 16);

  c.onclick = () => {
    score++;
    scoreEl.textContent = `النقاط: ${score}`;
    c.remove();
  };
}

async function endGame() {
  clearInterval(interval);
  await addDoc(leaderboardRef, {
    name: document.getElementById("player-name").value || "لاعب",
    score,
    createdAt: serverTimestamp()
  });
  loadLeaderboard();
  document.getElementById("game-over").style.display = "flex";
}

// ---------- LEADERBOARD ----------
async function loadLeaderboard() {
  leaderboardList.innerHTML = "";
  const q = query(leaderboardRef, orderBy("score", "desc"), limit(3));
  const snap = await getDocs(q);
  snap.forEach(doc => {
    const d = doc.data();
    const li = document.createElement("li");
    li.textContent = `${d.name} - ${d.score}`;
    leaderboardList.appendChild(li);
  });
}

loadLeaderboard();
</script>

</body>
</html>
