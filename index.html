<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إطعام مريومة</title>
    <style>
        /* --- General Styles --- */
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Cairo', Arial, sans-serif; }
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: #333;
            touch-action: none;
        }
        button { cursor: pointer; font-family: inherit; }

        /* --- Ad Banner Container --- */
        #ad-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: #f0f0f0;
            padding: 5px 0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70px;
        }

        /* --- Containers --- */
        .page {
            width: 100%; max-width: 450px;
            flex-grow: 1;
            position: relative;
            background: #f0f0f0; display: none; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,.5);
        }
        #game-container { display: flex; }

        /* --- Game UI & Info Bar --- */
        #info-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; font-size: 20px; background: #fff; }
        #pause-btn { font-size: 24px; background: none; border: none; padding: 0 10px; margin-left: auto; }
        #game-board { position: relative; flex-grow: 1; background: lightpink; overflow: hidden; border-top: 3px solid #333; border-bottom: 3px solid #333; }
        #player { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; display: none; object-fit: contain; }

        /* --- Shapes & Animations --- */
        .shape { position: absolute; top: -50px; }
        .circle { width: 40px; height: 40px; background-size: contain; background-position: center; background-repeat: no-repeat; }
        .triangle { width: 40px; height: 40px; background: url('obstacle.png') center/contain no-repeat; }
        .collected-animation { animation: simple-collect 0.2s ease-out; }
        @keyframes simple-collect { 50% { opacity: 0.6; } }

        /* --- Overlays --- */
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,.7);
            color: white; z-index: 10; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .overlay button { padding: 15px 30px; font-size: 22px; border: none; border-radius: 10px; background: #ffc107; margin-top: 15px; }
        #start-screen .button-group { display: flex; gap: 10px; margin-top: 10px; }
        #start-screen .button-group button { font-size: 18px; padding: 12px 20px; margin-top: 0; }
        #game-over-overlay { display: none; }
        #game-over-overlay h2 { font-size: 32px; margin-bottom: 10px; }

        /* --- START: New Styles for Ad Popup --- */
        #ad-popup-overlay {
            position: fixed; /* Use fixed to cover the whole screen */
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000; /* Must be higher than other overlays */
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
        }
        #ad-popup-content {
            background: #fff;
            padding: 20px;
            padding-top: 40px; /* Space for close button */
            border-radius: 10px;
            position: relative;
            width: 90%;
            max-width: 400px; /* Adjust as needed */
            text-align: center;
        }
        #close-ad-btn {
            position: absolute;
            top: 5px;
            left: 10px; /* Changed to left for LTR context */
            background: transparent;
            border: none;
            font-size: 28px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            padding: 0 5px;
            margin: 0;
        }
        /* --- END: New Styles for Ad Popup --- */

        /* --- Input Fields --- */
        .input-field { padding: 10px; font-size: 18px; border-radius: 8px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; direction: ltr; width: 80%; }
        #start-btn:disabled { background: #999; cursor: not-allowed; }
        #validation-error { color: #ffc107; font-size: 14px; height: 16px; margin-bottom: 5px; }

        /* --- Controls & Timer --- */
        .time-warning { color: red; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { transform: scale(1.1); } }
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 10%; box-sizing: border-box; }
        #controls button { width: 80px; height: 60px; font-size: 36px; border-radius: 10px; background: rgba(255,255,255,.4); border: 2px solid rgba(255,255,255,.7); }

        /* --- Leaderboard Page --- */
        #leaderboard-page { padding: 20px; box-sizing: border-box; text-align: center; }
        #leaderboard-page h1 { font-size: 28px; margin-bottom: 20px; }
        #leaderboard-list { list-style: none; padding: 0; margin: 0; width: 100%; }
        #leaderboard-list li { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; background: #e9e9e9; border-radius: 8px; font-size: 18px; }
        #leaderboard-list li .name { flex: 1; text-align: right; }
        #leaderboard-list li .score { flex: 0 0 80px; text-align: center; font-weight: bold; }
        #leaderboard-list li:nth-child(1) { background: #ffd700; font-weight: bold; }
        #leaderboard-list li:nth-child(2) { background: #c0c0c0; }
        #leaderboard-list li:nth-child(3) { background: #cd7f32; }
        .back-btn { padding: 15px 40px; font-size: 20px; border-radius: 10px; background: #28a745; color: white; border: none; margin-top: 20px; }
    </style>
</head>
<body>

<!-- Top Ad Banner Container -->
<div id="ad-container">
    <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
        <iframe data-aa='2428022' src='//acceptable.a-ads.com/2428022/?size=Adaptive' style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
    </div>
</div>

<!-- Page 1: Game -->
<div id="game-container" class="page">
    <div id="info-bar">
        <div id="score">النقاط: 0</div>
        <div id="timer">الوقت: 00:00</div>
        <button id="pause-btn">⏸</button>
    </div>
    <div id="game-board">
        <div id="start-screen" class="overlay">
            <h1>إطعام مريومة</h1>
            <p>سجّل الدخول أو أنشئ حساباً</p>
            <div id="validation-error"></div>
            <input id="insta-user" class="input-field" placeholder="يوزر الانستغرام (@user)" maxlength="30">
            <input type="text" id="private-id" class="input-field" placeholder="الرمز">
            <div class="button-group">
                <button id="start-btn" disabled>دخول / تسجيل</button>
                <button id="view-leaderboard-btn">🏆 أفضل 10</button>
            </div>
        </div>
        <div id="game-over-overlay" class="overlay">
            <h2>للأسف، خسرت!</h2>
            <p id="final-score-text" style="font-size: 24px;">نقاطك: 0</p>
        </div>
        <img id="player" src="character.png">
        <div id="controls">
            <button id="right-btn">→</button>
            <button id="left-btn">←</button>
        </div>
    </div>
</div>

<!-- Page 2: Leaderboard -->
<div id="leaderboard-page" class="page">
    <h1>🏆 قائمة أفضل 10 أبطال</h1>
    <ol id="leaderboard-list"><li>يتم التحميل...</li></ol>
    <button class="back-btn">العب مرة أخرى</button>
</div>

<!-- START: New Ad Popup Container -->
<div id="ad-popup-overlay">
    <div id="ad-popup-content">
        <button id="close-ad-btn">×</button>
        <!-- BEGIN AADS AD UNIT 2428030 -->
        <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
            <iframe data-aa='2428030' src='//acceptable.a-ads.com/2428030/?size=Adaptive' style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
        </div>
        <!-- END AADS AD UNIT 2428030 -->
    </div>
</div>
<!-- END: New Ad Popup Container -->

<audio id="collect-sound" src="collect.mp3"></audio>
<audio id="lose-sound" src="lose.mp3"></audio>
<audio id="background-music" src="background.mp3" loop></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, setDoc, query, orderBy, limit, getDocs, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyDsJ6fm4SFNLnRuHj-b80L0BweGVNkoiIM",
      authDomain: "game-21f55.firebaseapp.com",
      projectId: "game-21f55",
      storageBucket: "game-21f55.firebasestorage.app",
      messagingSenderId: "88852711134",
      appId: "1:88852711134:web:c504445d3d800c3e13244f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const usersRef = collection(db, "users");

    const collectibleImages = ['item1.png', 'item2.png', 'item3.png', 'item4.png'];

    const pages = document.querySelectorAll('.page');
    const gameContainer = document.getElementById("game-container");
    const leaderboardPage = document.getElementById("leaderboard-page");
    const board = document.getElementById("game-board");
    const player = document.getElementById("player");
    const scoreEl = document.getElementById("score");
    const timerEl = document.getElementById("timer");
    const startScreen = document.getElementById("start-screen");
    const gameOverOverlay = document.getElementById("game-over-overlay");
    const finalScoreText = document.getElementById("final-score-text");
    const leaderboardList = document.getElementById("leaderboard-list");
    const collectSound = document.getElementById("collect-sound");
    const loseSound = document.getElementById("lose-sound");
    const backgroundMusic = document.getElementById("background-music");
    const startBtn = document.getElementById("start-btn");
    const pauseBtn = document.getElementById("pause-btn");
    const viewLeaderboardBtn = document.getElementById("view-leaderboard-btn");
    const instaUser = document.getElementById("insta-user");
    const privateIdInput = document.getElementById("private-id");
    const validationError = document.getElementById("validation-error");
    const backBtns = document.querySelectorAll('.back-btn');

    // NEW: Get Ad Popup elements
    const adPopupOverlay = document.getElementById("ad-popup-overlay");
    const closeAdBtn = document.getElementById("close-ad-btn");

    const INITIAL_TIME = 600; 
    let score = 0, time = 0, speed = 6, speedModifier = 1.0;
    let isGameOver = true, isPaused = false, frenzy = false;
    let move = { left: false, right: false };
    let shapeInterval, timerInterval, gameLoopId;
    let fallingShapes = [];
    let currentUser = null;

    function showPage(pageToShow) {
        pages.forEach(p => p.style.display = 'none');
        pageToShow.style.display = 'flex';
    }

    viewLeaderboardBtn.onclick = () => {
        loadLeaderboard();
        showPage(leaderboardPage);
    };

    backBtns.forEach(btn => {
        btn.onclick = () => {
            showPage(gameContainer);
            startNewGameRound();
        };
    });

    // NEW: Add event listener for the popup close button
    closeAdBtn.onclick = () => {
        adPopupOverlay.style.display = 'none'; // Hide the ad
        gameOverOverlay.style.display = 'none'; // Hide the game over screen
        loadLeaderboard();
        showPage(leaderboardPage); // Show the leaderboard
    };

    const instaRegex = /^@[a-zA-Z0-9_]{1,30}$/;
    const idRegex = /^[a-zA-Z0-9]{6,}$/;

    function validateInputs() {
        const user = instaUser.value;
        const privateId = privateIdInput.value;
        if (instaRegex.test(user) && idRegex.test(privateId)) {
            startBtn.disabled = false;
            validationError.textContent = '';
        } else {
            startBtn.disabled = true;
            if (user && !instaRegex.test(user)) {
                validationError.textContent = 'يوزر الانستغرام يجب أن يبدأ بـ @';
            } else if (privateId && !idRegex.test(privateId)) {
                validationError.textContent = 'الرمز يجب أن يتكون من 6 أحرف أو أرقام على الأقل';
            } else {
                validationError.textContent = '';
            }
        }
    }
    instaUser.addEventListener('input', validateInputs);
    privateIdInput.addEventListener('input', validateInputs);

    startBtn.onclick = async () => {
        const username = instaUser.value;
        const privateId = privateIdInput.value;
        startBtn.disabled = true;
        startBtn.textContent = 'جاري التحقق...';
        validationError.textContent = '';

        try {
            const userDocRef = doc(db, "users", username);
            const userDoc = await getDoc(userDocRef);

            if (userDoc.exists()) {
                const userData = userDoc.data();
                if (userData.privateId === privateId) {
                    currentUser = { username, ...userData };
                    showWelcomeMessage(`أهلاً بعودتك ${username}`);
                    loginSuccess();
                } else {
                    validationError.textContent = 'الرمز غير صحيح.';
                }
            } else {
                const newUser = {
                    username,
                    privateId,
                    highScore: 0,
                    createdAt: serverTimestamp()
                };
                await setDoc(userDocRef, newUser);
                currentUser = newUser;
                showWelcomeMessage(`أهلاً بك ${username}! تم إنشاء حسابك.`);
                loginSuccess();
            }
        } catch (error) {
            console.error("Auth Error: ", error);
            validationError.textContent = 'حدث خطأ، حاول مرة أخرى.';
        } finally {
            startBtn.disabled = false;
            startBtn.textContent = 'دخول / تسجيل';
        }
    };
    
    function loginSuccess() {
        localStorage.setItem('savedMariomaUser', JSON.stringify({u: currentUser.username, p: currentUser.privateId}));
        startScreen.style.display = "none";
        startNewGameRound();
    }

    function startNewGameRound() {
        score = 0;
        time = INITIAL_TIME;
        speedModifier = 1.0;
        isGameOver = false;
        isPaused = false;
        frenzy = false;
        fallingShapes.forEach(s => s.element.remove());
        fallingShapes = [];
        scoreEl.textContent = `النقاط: 0`;
        timerEl.classList.remove("time-warning");
        player.style.display = "block";
        gameOverOverlay.style.display = "none";
        
        clearInterval(timerInterval);
        clearInterval(shapeInterval);
        cancelAnimationFrame(gameLoopId);
        
        backgroundMusic.currentTime = 0;

        updateTimer();
        resumeGame();
        gameLoop();
    }

    function pauseGame() {
        if (isGameOver) return;
        isPaused = true;
        pauseBtn.textContent = '▶️';
        clearInterval(timerInterval);
        clearInterval(shapeInterval);
        backgroundMusic.pause();
    }

    function resumeGame() {
        if (isGameOver) return;
        isPaused = false;
        pauseBtn.textContent = '⏸';
        shapeInterval = setInterval(createShape, frenzy ? 450 : 900);
        timerInterval = setInterval(updateTimer, 1000);
        backgroundMusic.play();
    }
    pauseBtn.onclick = () => { isPaused ? resumeGame() : pauseGame(); };

    function updateTimer() {
        const minutes = Math.floor(time / 60).toString().padStart(2, '0');
        const seconds = (time % 60).toString().padStart(2, '0');
        timerEl.textContent = `الوقت: ${minutes}:${seconds}`;
        const minutesPassed = Math.floor((INITIAL_TIME - time) / 60);
        speedModifier = 1.0 + (minutesPassed * 0.2);
        if (!frenzy && time > 0 && time <= (INITIAL_TIME / 2)) {
            frenzy = true;
            timerEl.classList.add("time-warning");
            clearInterval(shapeInterval);
            shapeInterval = setInterval(createShape, 450);
        }
        if (time <= 0) winGame();
        time--;
    }

    // MODIFIED: endGame function to show popup
    function endGame(status) {
        if (isGameOver) return;
        isGameOver = true;
        pauseGame();
        cancelAnimationFrame(gameLoopId);
        
        if (status === 'loss') {
            loseSound.play();
            finalScoreText.textContent = `نقاطك: ${score}`;
            gameOverOverlay.style.display = 'flex'; // Show game over screen
            adPopupOverlay.style.display = 'flex'; // Show ad popup
        } else { // On win, go to leaderboard directly
             setTimeout(() => {
                loadLeaderboard();
                showPage(leaderboardPage);
            }, 500);
        }
        
        saveScore();
    }

    const loseGame = () => endGame('loss');
    const winGame = () => endGame('win');

    async function saveScore() {
        if (!currentUser) return;
        if (score > (currentUser.highScore || 0)) {
            const userDocRef = doc(db, "users", currentUser.username);
            await updateDoc(userDocRef, { highScore: score });
            currentUser.highScore = score;
        }
    }

    async function loadLeaderboard() {
        leaderboardList.innerHTML = "<li>يتم التحميل...</li>";
        try {
            const q = query(usersRef, orderBy("highScore", "desc"), limit(10));
            const snap = await getDocs(q);
            if (snap.empty) {
                leaderboardList.innerHTML = "<li>لا توجد نقاط بعد، كن أول الأبطال!</li>";
                return;
            }
            leaderboardList.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                if(data.highScore > 0) {
                    const li = document.createElement("li");
                    li.innerHTML = `<span class="name">${data.username}</span><strong class="score">${data.highScore}</strong>`;
                    leaderboardList.appendChild(li);
                }
            });
        } catch (error) {
            console.error("Error loading leaderboard: ", error);
            leaderboardList.innerHTML = "<li>حدث خطأ في تحميل القائمة.</li>";
        }
    }
    
    function gameLoop(){if(isGameOver||isPaused){gameLoopId=requestAnimationFrame(gameLoop);return}if(move.left)movePlayer(-speed);if(move.right)movePlayer(speed);for(let i=fallingShapes.length-1;i>=0;i--){const shapeData=fallingShapes[i];shapeData.y+=shapeData.fallSpeed;shapeData.element.style.top=shapeData.y+"px";if(collide(player,shapeData.element)){if(shapeData.element.classList.contains("circle")){score++;scoreEl.textContent=`النقاط: ${score}`;collectSound.currentTime=0;collectSound.play();player.classList.add("collected-animation");setTimeout(()=>player.classList.remove("collected-animation"),200);shapeData.element.remove();fallingShapes.splice(i,1)}else{loseGame()}}else if(shapeData.y>board.offsetHeight){shapeData.element.remove();fallingShapes.splice(i,1)}}gameLoopId=requestAnimationFrame(gameLoop)}
    function movePlayer(dx){const x=player.offsetLeft+dx;const max=board.offsetWidth-player.offsetWidth;player.style.left=Math.max(0,Math.min(max,x))+"px"}
    function collide(a,b){const A=a.getBoundingClientRect();const B=b.getBoundingClientRect();return!(A.right<B.left||A.left>B.right||A.bottom<B.top||A.top>B.bottom)}
    document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")move.left=true;if(e.key==="ArrowRight")move.right=true});document.addEventListener("keyup",e=>{if(e.key==="ArrowLeft")move.left=false;if(e.key==="ArrowRight")move.right=false});document.querySelector("#left-btn").addEventListener("touchstart",e=>{e.preventDefault();move.left=true});document.querySelector("#right-btn").addEventListener("touchstart",e=>{e.preventDefault();move.right=true});document.addEventListener("touchend",()=>{move.left=false;move.right=false});document.addEventListener("mousedown",e=>{if(e.target.id==='left-btn')move.left=true;if(e.target.id==='right-btn')move.right=true});document.addEventListener("mouseup",()=>{move.left=false;move.right=false});
    function showWelcomeMessage(message){const div=document.createElement('div');div.textContent=message;Object.assign(div.style,{position:'fixed',top:'20px',left:'50%',transform:'translateX(-50%)',padding:'10px 25px',background:'rgba(40,167,69,0.9)',color:'white',borderRadius:'10px',zIndex:'1000',fontSize:'18px',fontWeight:'bold',boxShadow:'0 4px 10px rgba(0,0,0,0.2)'});document.body.appendChild(div);setTimeout(()=>{div.style.transition='opacity 0.5s';div.style.opacity='0';setTimeout(()=>div.remove(),500)},2500)}
    function loadSavedUser(){const savedUserStr=localStorage.getItem('savedMariomaUser');if(savedUserStr){try{const savedUser=JSON.parse(savedUserStr);instaUser.value=savedUser.u;privateIdInput.value=savedUser.p;validateInputs()}catch(e){localStorage.removeItem('savedMariomaUser')}}}

    // Initial setup
    showPage(gameContainer);
    loadSavedUser();
</script>

<!-- Script to refresh top ad banner -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const adIframe = document.querySelector("iframe[data-aa='2428022']");
        if (adIframe) {
            const originalSrc = adIframe.src;
            setInterval(function() {
                adIframe.src = originalSrc + '&cb=' + Math.random();
            }, 20000);
        }
    });
</script>

</body>
</html>
